name: update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write  # इसे 'read' से 'write' किया गया है ताकि कोड पुश हो सके

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v6 से v4 किया गया

      - uses: tibdex/github-app-token@v1.8.2
        if: ${{ !env.ACT }}
        id: create-app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4 # v6 से v4 किया गया
        if: ${{ !env.ACT }}
        with:
          token: ${{ steps.create-app-token.outputs.token }}

      - uses: actions/setup-node@v4 # v6 से v4 किया गया
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Update internal playlists
        id: playlist-update
        run: |
          npm run playlist:update
          # ध्यान दें: अगर लॉग फाइल नहीं मिली तो ये स्टेप फेल हो सकता है
          if [ -f temp/logs/playlist_update.log ]; then
            echo "processed_issues=$(cat temp/logs/playlist_update.log)" >> $GITHUB_OUTPUT
          else
            echo "processed_issues=0" >> $GITHUB_OUTPUT
          fi

      - name: Check internal playlists
        run: |
          npm run playlist:lint
          npm run playlist:validate

      - name: Generate public playlists
        run: npm run playlist:generate

      - name: Create .api/streams.json
        run: npm run playlist:export

      - name: Update readme
        run: npm run readme:update

      - name: Setup git
        run: |
          git config user.name "iptv-bot[bot]"
          git config user.email "84861620+iptv-bot[bot]@users.noreply.github.com"

      - name: Commit changes to /streams
        if: steps.playlist-update.outputs.processed_issues != '0'
        run: |
          git add streams
          git commit --allow-empty -m "[Bot] Update /streams" -m "Committed by [iptv-bot](https://github.com/apps/iptv-bot) via [update](https://github.com/iptv-org/iptv/actions/runs/${{ github.run_id }}) workflow." -m "${{ steps.playlist-update.outputs.processed_issues }}" --no-verify

      - name: Commit changes to PLAYLISTS.md
        run: |
          git add PLAYLISTS.md
          git commit --allow-empty -m "[Bot] Update PLAYLISTS.md" -m "Committed by [iptv-bot](https://github.com/apps/iptv-bot) via [update](https://github.com/iptv-org/iptv/actions/runs/${{ github.run_id }}) workflow." --no-verify

      - name: Push all changes to the repository
        # अपनी ब्रांच का नाम चेक करें, अगर main है तो 'master' की जगह 'main' लिखें
        if: ${{ !env.ACT && github.ref == 'refs/heads/master' }}
        run: git push

      - name: Deploy public playlists to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.1
        if: ${{ !env.ACT && github.ref == 'refs/heads/master' }}
        with:
          repository-name: iptv-org/iptv
          branch: gh-pages
          folder: .gh-pages
          token: ${{ steps.create-app-token.outputs.token }}
          git-config-name: iptv-bot[bot]
          git-config-email: 84861620+iptv-bot[bot]@users.noreply.github.com
          commit-message: '[Bot] Deploy to GitHub Pages'
          clean: true

      - name: Move .api/streams.json to iptv-org/api
        uses: JamesIves/github-pages-deploy-action@4.1.1
        if: ${{ !env.ACT && github.ref == 'refs/heads/master' }}
        with:
          repository-name: iptv-org/api
          branch: gh-pages
          folder: .api
          token: ${{ steps.create-app-token.outputs.token }}
          git-config-name: iptv-bot[bot]
          git-config-email: 84861620+iptv-bot[bot]@users.noreply.github.com
          commit-message: '[Bot] Deploy to iptv-org/api'
          clean: false
